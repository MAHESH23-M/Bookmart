<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist | BookMart</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding: 40px;
  color: white;
}

.container {
  max-width: 700px;
  margin: auto;
}

h2 {
  margin-bottom: 30px;
  text-align: center;
  font-size: 28px;
}

.grid {
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.card {
  display: flex;
  background: rgba(255,255,255,0.95);
  color: #000;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  transition: 0.3s ease;
}

.card:hover {
  transform: scale(1.02);
}

.card img {
  width: 150px;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

.details {
  flex: 1;
  margin-left: 20px;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.author {
  font-size: 14px;
  color: #555;
  margin-bottom: 8px;
}

.description {
  font-size: 14px;
  margin-bottom: 10px;
  color: #333;
}

.price {
  font-weight: bold;
  margin-bottom: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 8px;
}

.move {
  background: #0ea5a4;
  color: white;
}

.remove {
  background: #ef4444;
  color: white;
}

.empty {
  text-align: center;
  margin-top: 100px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
<h2>❤️ Your Wishlist</h2>
<div id="wishlistContainer" class="grid"></div>
</div>

<script src="js/wishlist.js" defer></script>

</body>
</html>
